name: OCI Instance Retry

on:
  schedule:
    - cron: '* * * * *'  # every minute
  workflow_dispatch:      # manual trigger too

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | \
          bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH
          echo "$HOME/lib/oracle-cli/lib/python3.11/site-packages/oci_cli/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]
          user=${{ secrets.OCI_CLI_USER }}
          fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_CLI_TENANCY }}
          region=${{ secrets.OCI_CLI_REGION }}
          key_file=~/.oci/key.pem" > ~/.oci/config
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem ~/.oci/config

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub

      - name: Try all ADs
        run: |
          set +e
          ADS=(
            "dleJ:US-CHICAGO-1-AD-1"
            "dleJ:US-CHICAGO-1-AD-2"
            "dleJ:US-CHICAGO-1-AD-3"
          )

          for AD in "${ADS[@]}"; do
            echo "Trying $AD..."
            RESULT=$(~/bin/oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "${{ secrets.OCI_CLI_TENANCY }}" \
              --shape VM.Standard.A1.Flex \
              --shape-config '{"ocpus":1,"memoryInGBs":4}' \
              --image-id "ocid1.image.oc1.us-chicago-1.aaaaaaaaqzxgc5f4hbxsoi4mhogsodroy5wgnvxcpuwpt77gt4wl3a3x6m2q" \
              --subnet-id "ocid1.subnet.oc1.us-chicago-1.aaaaaaaa4a6iqjv6wdsspaud4nnck42vhlgl2gkpx773sihln3xsk4e3p7ia" \
              --ssh-authorized-keys-file ~/.ssh/id_rsa.pub \
              --display-name "free-a1" \
              --assign-public-ip true 2>&1)

              echo "RESULT: $RESULT"

            if echo "$RESULT" | grep -q 'PROVISIONING\|"id".*ocid'; then
              echo "SUCCESS in $AD"
              echo "$RESULT"
              exit 0
            fi
            echo "No capacity in $AD"
          done

          echo "No capacity found this run — will retry next minute"
          exit 0
